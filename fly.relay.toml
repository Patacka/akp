# fly.relay.toml — Fly.io config for a relay-only AKP node.
#
# A relay accepts inbound WebSocket connections from agents, accumulates the
# shared knowledge graph, and requires no LLM API keys.
#
# Deploy:
#   fly launch --name akp-relay-1 --config fly.relay.toml
#   fly volumes create akp_data --size 1 --region iad
#   fly secrets set NETWORK_ID=mainnet
#   fly deploy --config fly.relay.toml
#
# Cost: ~$0/mo on free tier (1 shared VM + 1 GB volume)

app = "akp-relay"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  SYNC_PORT  = "3001"
  PORT       = "8080"
  DATA_DIR   = "/data"
  NETWORK_ID = "mainnet"
  LOG_LEVEL  = "info"

# Override the default start command to run the relay
[processes]
  app = "node dist/relay.js"

[http_service]
  internal_port      = 8080
  force_https        = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1   # relay should always be up

  [http_service.concurrency]
    type       = "connections"
    soft_limit = 500
    hard_limit = 600

# Expose the WebSocket sync port directly (TCP passthrough for wss://)
[[services]]
  internal_port = 3001
  protocol = "tcp"

  [[services.ports]]
    port = 3001

[[vm]]
  memory   = "256mb"
  cpu_kind = "shared"
  cpus     = 1

[[mounts]]
  source      = "akp_data"
  destination = "/data"

[checks]
  [checks.health]
    grace_period  = "10s"
    interval      = "30s"
    method        = "GET"
    path          = "/health"
    port          = 8080
    timeout       = "5s"
    type          = "http"
